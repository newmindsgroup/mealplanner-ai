# ============================================================================
# NourishAI — Docker Compose
# Orchestrates: App Server + MySQL + NourishAI Swarm
# ============================================================================

version: '3.9'

services:
  # --- MealPlan App Server ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nourishai-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_HOST=mysql
      - DATABASE_USER=nourishai
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=mealplan_assistant
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=7d
      - JWT_REFRESH_EXPIRY=30d
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-anthropic}
      - NOURISH_SWARM_URL=http://swarm:8000
      - USDA_API_KEY=${USDA_API_KEY}
      - SEARCH_API_KEY=${SEARCH_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    networks:
      - nourishai

  # --- MySQL Database ---
  mysql:
    image: mysql:8.0
    container_name: nourishai-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DATABASE_PASSWORD}
      - MYSQL_DATABASE=mealplan_assistant
      - MYSQL_USER=nourishai
      - MYSQL_PASSWORD=${DATABASE_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nourishai

  # --- NourishAI Swarm (Sidecar) ---
  swarm:
    image: nourishai/swarm:latest
    container_name: nourishai-swarm
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - USDA_API_KEY=${USDA_API_KEY}
      - SEARCH_API_KEY=${SEARCH_API_KEY}
    networks:
      - nourishai

  # --- NGINX Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: nourishai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
      - swarm
    networks:
      - nourishai

volumes:
  mysql_data:
  uploads:

networks:
  nourishai:
    driver: bridge
